<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💪 Тренировки</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap');
:root {
  --bg:#0f0f0f; --card:#1a1a1a; --card2:#242424;
  --accent:#c8ff47; --accent-dim:rgba(200,255,71,0.1);
  --text:#efefef; --muted:#5a5a5a; --border:#2a2a2a;
  --green:#4ade80; --blue:#60a5fa;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:90px}
.header{background:var(--bg);padding:14px 16px 0;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--accent)}
.stats-pill{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.stats-pill b{color:var(--accent);font-size:13px}
.day-tabs{display:flex;gap:6px;padding-bottom:10px}
.day-tab{flex:1;padding:10px 4px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'Manrope',sans-serif;font-size:10px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;text-transform:uppercase;line-height:1.3}
.day-tab .dn{display:block;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:1px;line-height:1}
.day-tab.active{background:var(--accent);border-color:var(--accent);color:#000}
.progress-wrap{padding:8px 16px 10px}
.progress-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:10px;color:var(--muted)}
.progress-row b{color:var(--accent)}
.progress-bg{background:var(--card2);border-radius:4px;height:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s ease}
.content{padding:16px 12px 0}
.muscle-group{margin-bottom:24px}
.muscle-label{display:flex;flex-direction:row;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;padding:0 4px;text-align:center}
.muscle-label .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.muscle-label span{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:var(--accent);text-transform:uppercase}
.muscle-label .muscle-icon{width:40px;height:40px;object-fit:contain;image-rendering:pixelated;flex-shrink:0}
.exercise-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;transition:border-color .25s,opacity .25s}
.exercise-card.done{border-color:rgba(74,222,128,.35);opacity:.65}
.ex-main{display:flex;align-items:center;padding:10px 12px;gap:12px}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:12.5px;font-weight:700;line-height:1.4;color:var(--text)}
.exercise-card.done .ex-name{text-decoration:line-through;color:var(--muted)}
.ex-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.weight-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;gap:1px;cursor:pointer;padding:6px 10px;border-radius:10px;transition:background .15s,border-color .15s;min-width:52px;border:2px solid transparent}
.weight-col.editing{border-color:var(--accent);background:var(--accent-dim)}
.weight-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent);line-height:1;text-align:center}
.weight-unit{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.ex-check{width:36px;height:36px;border-radius:10px;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:16px;color:transparent;font-weight:900}
.exercise-card.done .ex-check{background:var(--green);border-color:var(--green);color:#000}
.ex-img{width:110px;height:110px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--card2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.ex-img img{width:110px;height:110px;object-fit:contain;border-radius:10px;display:block}
.ex-img svg{width:36px;height:36px;stroke:var(--muted);stroke-width:1.5;fill:none}
.weight-panel{display:none}
.weight-panel.open{display:block}
.wp-input-hidden{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;top:0;left:0}
/* Фиксированная плашка ввода над клавиатурой */
.weight-input-bar{
  display:none;
  position:fixed;
  left:0;right:0;bottom:0;
  z-index:300;
  background:var(--card);
  border-top:1px solid var(--border);
  padding:10px 16px 10px;
  align-items:center;
  gap:12px;
  box-shadow:0 -4px 24px rgba(0,0,0,.4);
}
.weight-input-bar.open{ display:flex; }
.wib-label{ font-size:11px;color:var(--muted);flex:1;line-height:1.4;font-weight:600 }
.wib-label b{ display:block;color:var(--text);font-size:12px;margin-bottom:1px }
.wib-input{
  background:var(--card2);
  border:2px solid var(--accent);
  border-radius:10px;
  color:var(--accent);
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;
  text-align:center;
  padding:8px 12px;
  outline:none;
  width:110px;
  flex-shrink:0;
}
.wib-done{
  width:40px;height:40px;border-radius:10px;
  background:var(--accent);border:none;
  color:#000;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.img-expand-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.82);align-items:center;justify-content:center}
.img-expand-overlay.open{display:flex}
.img-expand-inner{width:88vw;max-width:380px;border-radius:18px;overflow:hidden;background:var(--card);padding:10px;box-shadow:0 24px 64px rgba(0,0,0,.9)}
.img-expand-inner img{width:100%;height:auto;display:block;border-radius:12px}
.done-banner{display:none;background:linear-gradient(135deg,rgba(200,255,71,.08),rgba(200,255,71,.02));border:1px solid rgba(200,255,71,.25);border-radius:14px;padding:16px;margin:0 12px 16px;text-align:center}
.done-banner.show{display:block}
.done-banner .db-emoji{font-size:32px;margin-bottom:6px}
.done-banner .db-text{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--accent)}
.done-banner .db-sub{font-size:11px;color:var(--muted);margin-top:4px}
.finish-btn{display:none;margin:0 12px 16px;width:calc(100% - 24px);padding:15px;border-radius:14px;background:var(--accent);border:none;color:#000;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;transition:opacity .2s}
.finish-btn.show{display:block}
.finish-btn:active{opacity:.8}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px 18px 40px;width:100%;max-width:480px;border-top:1px solid var(--border)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:14px;color:var(--accent)}
.modal-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;font-weight:700}
.modal-input{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Manrope',sans-serif;font-size:13px;padding:10px 12px;outline:none;resize:none;line-height:1.5;transition:border-color .2s;margin-bottom:12px}
.modal-input:focus{border-color:var(--accent)}
.modal-row{display:flex;gap:8px;margin-bottom:16px}
.modal-row>div{flex:1}
.modal-btns{display:flex;gap:8px}
.btn-save{flex:1;padding:13px;border-radius:10px;background:var(--accent);border:none;color:#000;font-family:'Manrope',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:opacity .2s}
.btn-save:active{opacity:.8}
.btn-cancel{padding:13px 18px;border-radius:10px;background:var(--card2);border:1px solid var(--border);color:var(--muted);font-family:'Manrope',sans-serif;font-weight:600;font-size:13px;cursor:pointer}
.hist-content{padding:16px 12px}
.hist-day-header{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--accent);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.hist-entry{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.hist-date{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.hist-pills{display:flex;flex-wrap:wrap;gap:5px}
.hist-pill{background:var(--card2);border-radius:8px;padding:4px 9px;font-size:11px;color:var(--text);display:flex;gap:5px;align-items:center;font-weight:500}
.hist-pill .hw{color:var(--accent);font-weight:800;font-family:'Bebas Neue',sans-serif;font-size:14px;line-height:1}
.hist-empty{color:var(--muted);font-size:13px;text-align:center;padding:40px 20px;line-height:1.8}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:200}
.nav-btn{flex:1;padding:12px 8px 10px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Manrope',sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .2s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:20px;height:20px;stroke-width:2}
.view{display:none}
.view.active{display:block}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--green);color:#000;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:800;opacity:0;transition:all .3s;z-index:900;pointer-events:none;white-space:nowrap;font-family:'Manrope',sans-serif}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Фиксированная плашка ввода веса над клавиатурой -->
<div class="weight-input-bar" id="weightInputBar">
  <div class="wib-label"><b id="wibExName"></b>кг</div>
  <input class="wib-input" type="text" id="wibInput" inputmode="decimal"
    onkeydown="onWibKeydown(event)"
    oninput="onWibInput(this.value)"
    onchange="onWibInput(this.value)">
  <button class="wib-done" onclick="closeWib()">✓</button>
</div>

<!-- Image expand overlay -->
<div class="img-expand-overlay" id="imgOverlay" onclick="closeImgOverlay()">
  <div class="img-expand-inner" onclick="event.stopPropagation()">
    <img id="imgOverlayImg" src="" alt="">
  </div>
</div>

<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ Изменить упражнение</div>
    <div class="modal-label">Название</div>
    <textarea class="modal-input" id="editName" rows="2"></textarea>
    <div class="modal-row">
      <div>
        <div class="modal-label">Подходы</div>
        <input class="modal-input" type="number" id="editSets" min="1" max="10" style="margin-bottom:0">
      </div>
      <div>
        <div class="modal-label">Повторения</div>
        <input class="modal-input" type="number" id="editReps" min="1" max="100" style="margin-bottom:0">
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" onclick="saveEdit()">Сохранить</button>
    </div>
  </div>
</div>

<div class="view active" id="view-workout">
  <div class="header">
    <div class="header-top">
      <div class="app-title">Т 🏋🏻</div>
      <div class="stats-pill">Сессий: <b id="sessionCount">0</b></div>
    </div>
    <div class="day-tabs" id="dayTabs"></div>
    <div class="progress-wrap">
      <div class="progress-row"><span>Прогресс дня</span><b id="progLabel">0 / 0</b></div>
      <div class="progress-bg"><div class="progress-fill" id="progBar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="done-banner" id="doneBanner">
    <div class="db-emoji">🔥</div>
    <div class="db-text">Тренировка завершена!</div>
    <div class="db-sub">Все упражнения выполнены</div>
  </div>
  <button class="finish-btn" id="finishBtn" onclick="finishWorkout()">✓ ЗАВЕРШИТЬ ТРЕНИРОВКУ</button>
  <div class="content" id="workoutContent"></div>
</div>

<div class="view" id="view-history">
  <div class="header">
    <div class="header-top">
      <div class="app-title">📊 ИСТОРИЯ</div>
      <button onclick="clearHistory()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--muted);font-size:10px;cursor:pointer;font-family:Manrope,sans-serif;font-weight:700">Очистить</button>
    </div>
  </div>
  <div class="hist-content" id="histContent"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-workout" onclick="switchView('workout')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 4v16M18 4v16M6 12h12M3 8h3M18 8h3M3 16h3M18 16h3"/></svg>
    Тренировка
  </button>
  <button class="nav-btn" id="nav-history" onclick="switchView('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    История
  </button>
</nav>

let S = { currentDay:0, step:2.5, program:null, weights:{}, done:{}, history:[], openPanel:null, editTarget:null };

function load() {
  try { const r = localStorage.getItem('gym_v4'); if(r) S = {...S,...JSON.parse(r)}; } catch(e){}
  if (!S.program) S.program = JSON.parse(JSON.stringify(DEFAULT_PROGRAM));
  if (!S.weights || !Object.keys(S.weights).length) S.weights = {...DEFAULT_WEIGHTS};
  if (!S.history) S.history = [];
  if (!S.done) S.done = {};
  if (!S.step) S.step = 2.5;
}

function save() { try { localStorage.setItem('gym_v4', JSON.stringify(S)); } catch(e){} }

function switchView(v) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
  if(v==='history') renderHistory();
}

function renderDayTabs() {
  const c = document.getElementById('dayTabs'); c.innerHTML='';
  S.program.forEach((day,i)=>{
    const b = document.createElement('button');
    b.className = 'day-tab'+(i===S.currentDay?' active':'');
    const lines = day.label.split('\n');
    b.innerHTML = `<span class="dn">${day.day}</span>${lines[0]}`;
    b.onclick = ()=>{ S.currentDay=i; S.openPanel=null; save(); renderWorkout(); };
    c.appendChild(b);
  });
}

function renderWorkout() {
  renderDayTabs();
  const day = S.program[S.currentDay];
  const allIds = day.groups.flatMap(g=>g.exercises.map(e=>e.id));
  const doneCount = allIds.filter(id=>S.done[id]).length;
  const total = allIds.length;
  document.getElementById('progLabel').textContent = doneCount+' / '+total;
  document.getElementById('progBar').style.width = (total?Math.round(doneCount/total*100):0)+'%';
  document.getElementById('sessionCount').textContent = S.history.length;
  const allDone = doneCount===total && total>0;
  document.getElementById('doneBanner').classList.toggle('show',allDone);
  document.getElementById('finishBtn').classList.toggle('show',allDone);

  const container = document.getElementById('workoutContent');
  container.innerHTML = '';

  day.groups.forEach((group,gi)=>{
    const gDiv = document.createElement('div');
    gDiv.className = 'muscle-group';
    const isBack = group.name === 'СПИНА';
    const muscleIcon = isBack
      ? `<img class="muscle-icon" src="${IMG_PIXEL_BACK}" alt="">`
      : `<div class="dot"></div>`;
    gDiv.innerHTML = `<div class="muscle-label">${muscleIcon}<span>${group.name}</span></div>`;

    group.exercises.forEach((ex,ei)=>{
      const isDone = !!S.done[ex.id];
      const w = S.weights[ex.id]??0;
      const isOpen = S.openPanel===ex.id;

      const imgSrc = IMGS[ex.id] || null;
      const imgAnimSrc = IMGS_ANIM[ex.id] || imgSrc;
      const imgHtml = `<div class="ex-img" id="img_${ex.id}"
        onclick="tapImg('${ex.id}', ${imgSrc ? `'${imgSrc}'` : 'null'}, ${imgAnimSrc ? `'${imgAnimSrc}'` : 'null'})">
        ${imgSrc
          ? `<img src="${imgSrc}" alt="">`
          : `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 15l5-5 4 4 3-3 6 6"/><circle cx="8.5" cy="8.5" r="1.5"/></svg>`}
      </div>`;

      const card = document.createElement('div');
      card.className = 'exercise-card'+(isDone?' done':'');
      card.innerHTML = `
        <div class="ex-main">
          ${imgHtml}
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
          </div>
          <div class="ex-right">
            <div class="weight-col${isOpen?' editing':''}" id="wcol_${ex.id}"
              ontouchstart="touchStartWeight(event,'${ex.id}')"
              ontouchend="touchEndWeight(event,'${ex.id}')"
              onclick="onWeightClick('${ex.id}')">
              <div class="weight-val" data-id="${ex.id}">${w}</div>
              <div class="weight-unit">кг</div>
            </div>
            <div class="ex-check" onclick="toggleDone('${ex.id}')">${isDone?'✓':''}</div>
          </div>
        </div>
      `;
      gDiv.appendChild(card);
    });
    container.appendChild(gDiv);
  });
}

let _touchStartY = 0;
let _touchStartX = 0;
let _touchHandled = false;

function touchStartWeight(e, id){
  _touchStartY = e.touches[0].clientY;
  _touchStartX = e.touches[0].clientX;
  _touchHandled = false;
}

function touchEndWeight(e, id){
  const dy = Math.abs(e.changedTouches[0].clientY - _touchStartY);
  const dx = Math.abs(e.changedTouches[0].clientX - _touchStartX);
  if(dy > 8 || dx > 8) return; // скролл — игнорируем
  e.preventDefault(); // блокирует последующий onclick
  _touchHandled = true;
  togglePanel(id);
}

function onWeightClick(id){
  if(_touchHandled){ _touchHandled = false; return; } // уже обработано touch
  togglePanel(id);
}

function tapImg(id, staticSrc, animSrc) {
  if (!staticSrc) return;
  // показываем анимированную версию в оверлее
  const src = animSrc || staticSrc;
  document.getElementById('imgOverlayImg').src = src;
  document.getElementById('imgOverlay').classList.add('open');
}
function closeImgOverlay() {
  document.getElementById('imgOverlay').classList.remove('open');
  // сбрасываем src чтобы GIF остановился при следующем открытии начинал заново
  setTimeout(()=>{ document.getElementById('imgOverlayImg').src = ''; }, 300);
}

function toggleDone(id){
  if(S.openPanel) closeWib();
  S.done[id] = !S.done[id];
  save();
  renderWorkout();
}

// флаг — ожидаем первый ввод (будем стирать старое)
let _weightFresh = false;

function togglePanel(id){
  if(S.openPanel === id){ closeWib(); return; }
  if(S.openPanel) closeWib();

  S.openPanel = id;
  _weightFresh = true;
  save();

  // подсвечиваем карточку
  const wcol = document.getElementById('wcol_'+id);
  if(wcol) wcol.classList.add('editing');

  // открываем фиксированную плашку
  const day = S.program[S.currentDay];
  let exName = '';
  day.groups.forEach(g => g.exercises.forEach(e => { if(e.id===id) exName=e.name; }));
  const w = S.weights[id] ?? 0;

  document.getElementById('wibExName').textContent = exName.length > 30 ? exName.slice(0,30)+'…' : exName;
  const wibInp = document.getElementById('wibInput');
  wibInp.value = w;
  document.getElementById('weightInputBar').classList.add('open');

  // двигаем плашку прямо над клавиатурой через visualViewport
  if(window.visualViewport){
    const reposition = () => {
      const bar = document.getElementById('weightInputBar');
      const vv = window.visualViewport;
      bar.style.bottom = (window.innerHeight - vv.height - vv.offsetTop) + 'px';
    };
    window.visualViewport.addEventListener('resize', reposition);
    window.visualViewport.addEventListener('scroll', reposition);
    window._wibVVCleanup = reposition;
  }

  setTimeout(() => { wibInp.focus(); try{ wibInp.setSelectionRange(wibInp.value.length, wibInp.value.length); }catch(e){} }, 50);
}

function closeWib(){
  S.openPanel = null;
  _weightFresh = false;
  save();
  document.getElementById('weightInputBar').classList.remove('open');
  document.getElementById('weightInputBar').style.bottom = '';
  // убираем listeners
  if(window._wibVVCleanup && window.visualViewport){
    window.visualViewport.removeEventListener('resize', window._wibVVCleanup);
    window.visualViewport.removeEventListener('scroll', window._wibVVCleanup);
    window._wibVVCleanup = null;
  }
  // снимаем подсветку со всех карточек
  document.querySelectorAll('.weight-col.editing').forEach(el => el.classList.remove('editing'));
}

function onWibKeydown(e){
  if(e.key === 'Enter'){ closeWib(); return; }
  if(e.key === 'Backspace' || e.key === 'Delete'){ _weightFresh = false; return; }
  if(e.key === ',' || e.key === '.'){ if(_weightFresh){ document.getElementById('wibInput').value=''; _weightFresh=false; } return; }
  if(_weightFresh && e.key >= '0' && e.key <= '9'){ document.getElementById('wibInput').value=''; _weightFresh=false; }
}

function onWibInput(val){
  if(!S.openPanel) return;
  const id = S.openPanel;
  const cleaned = String(val).replace(',','.');
  const valEl = document.querySelector(`.weight-val[data-id="${id}"]`);
  if(valEl) valEl.textContent = cleaned.endsWith('.') ? cleaned : (parseFloat(cleaned)||0);
  S.weights[id] = Math.max(0, parseFloat(cleaned)||0);
  save();
}

function closePanel(id){ closeWib(); }

function onWeightKeydown(id, e){
  if(e.key === 'Backspace' || e.key === 'Delete'){
    _weightFresh = false;
    return;
  }
  // разрешаем точку и запятую
  if(e.key === ',' || e.key === '.'){
    if(_weightFresh){
      const inp = document.getElementById('inp_'+id);
      if(inp) inp.value = '';
      _weightFresh = false;
    }
    return; // не блокируем
  }
  if(_weightFresh && e.key >= '0' && e.key <= '9'){
    const inp = document.getElementById('inp_'+id);
    if(inp) inp.value = '';
    _weightFresh = false;
  }
}

function setWeightDirect(id, val){
  const cleaned = String(val).replace(',', '.');
  const valEl = document.querySelector(`.weight-val[data-id="${id}"]`);
  if(valEl) valEl.textContent = cleaned.endsWith('.') ? cleaned : (parseFloat(cleaned) || 0);
  const num = Math.max(0, parseFloat(cleaned) || 0);
  S.weights[id] = num;
  save();
}

function finishWorkout(){
  const day=S.program[S.currentDay];
  const allIds=day.groups.flatMap(g=>g.exercises.map(e=>e.id));
  const snap={};
  allIds.forEach(id=>{ snap[id]=S.weights[id]??0; });
  S.history.push({date:Date.now(),dayIdx:S.currentDay,weights:snap});
  allIds.forEach(id=>{ delete S.done[id]; });
  save(); showToast('🏆 Тренировка сохранена!'); renderWorkout();
}

function openEdit(di,gi,ei){
  S.editTarget={di,gi,ei};
  const ex=S.program[di].groups[gi].exercises[ei];
  document.getElementById('editName').value=ex.name;
  document.getElementById('editSets').value=ex.sets;
  document.getElementById('editReps').value=ex.reps;
  document.getElementById('editOverlay').classList.add('open');
}

function closeModal(){ document.getElementById('editOverlay').classList.remove('open'); S.editTarget=null; }

function saveEdit(){
  if(!S.editTarget) return;
  const {di,gi,ei}=S.editTarget;
  const ex=S.program[di].groups[gi].exercises[ei];
  const n=document.getElementById('editName').value.trim();
  if(n) ex.name=n;
  ex.sets=parseInt(document.getElementById('editSets').value)||ex.sets;
  ex.reps=parseInt(document.getElementById('editReps').value)||ex.reps;
  save(); closeModal(); showToast('✅ Сохранено'); renderWorkout();
}

function renderHistory(){
  const container=document.getElementById('histContent');
  if(!S.history.length){
    container.innerHTML='<div class="hist-empty">📭 История пуста<br><span style="font-size:11px">Завершите тренировку,<br>чтобы данные сохранились</span></div>';
    return;
  }
  const byDay=[[],[],[]];
  [...S.history].reverse().forEach(h=>{ if(byDay[h.dayIdx]) byDay[h.dayIdx].push(h); });
  let html='';
  S.program.forEach((day,di)=>{
    const entries=byDay[di];
    if(!entries.length) return;
    html+=`<div class="hist-day-header">День ${day.day}</div>`;
    entries.forEach(h=>{
      const d=new Date(h.date);
      const ds=`${d.getDate()}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      const pills=day.groups.flatMap(g=>g.exercises).map(ex=>{
        const w=h.weights[ex.id]; if(w===undefined) return '';
        const short=ex.name.split(' ').slice(0,3).join(' ');
        return `<div class="hist-pill"><span style="color:var(--muted);font-size:10px">${short}</span><span class="hw">${w}</span></div>`;
      }).join('');
      html+=`<div class="hist-entry"><div class="hist-date">${ds}</div><div class="hist-pills">${pills}</div></div>`;
    });
  });
  container.innerHTML=html;
}

function clearHistory(){ if(!confirm('Очистить всю историю?')) return; S.history=[]; save(); renderHistory(); showToast('🗑 История очищена'); }

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

document.addEventListener('DOMContentLoaded',()=>{
  if(window.Telegram?.WebApp){ Telegram.WebApp.ready(); Telegram.WebApp.expand(); }
  load();
  S.openPanel = null;
  renderWorkout();

  // Закрытие при тапе снаружи плашки
  document.addEventListener('click', (e) => {
    if(!S.openPanel) return;
    const bar = document.getElementById('weightInputBar');
    const wcol = document.getElementById('wcol_' + S.openPanel);
    if(bar && !bar.contains(e.target) && wcol && !wcol.contains(e.target)){
      closeWib();
    }
  });
});
</script>
